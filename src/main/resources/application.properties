spring.application.name=manager

# Development H2 using a file-based DB with AUTO_SERVER so external tools (DBeaver) can connect
# Using file mode avoids TCP port binding conflicts. AUTO_SERVER allows other processes to open the same DB file.
spring.datasource.url=jdbc:h2:file:./data/managerdb;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=pass
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Update tables (preserve data between restarts)
spring.jpa.hibernate.ddl-auto=update

# Show SQL for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.security.user.name=admin
spring.security.user.password=pass
spring.security.user.roles=USER
dev.authless=true
